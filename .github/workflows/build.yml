name: Build and Push to GHCR

# 由 hyevan 通过 GitHub Actions 自动构建并推送到 GHCR（EVO4 直接 pull 预编译镜像）
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/hyevan/inventory-management-system

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION | tr -d 'vV\r')" >> "$GITHUB_OUTPUT"

      # GitHub 美国 runner 拉不到华为云 SWR / 国内 pip·npm 镜像，
      # 构建时把它们临时改成 Docker Hub / 官方源（只影响构建速度，成品镜像自包含）。
      - name: Rewrite sources for GitHub runner
        run: |
          sed -i 's#^FROM swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/python:3.12-slim#FROM python:3.12-slim#' backend/Dockerfile
          sed -i 's#pypi.tuna.tsinghua.edu.cn/simple#pypi.org/simple#' backend/Dockerfile
          sed -i 's#mirrors.aliyun.com/pypi/simple#pypi.org/simple#' backend/Dockerfile
          sed -i 's#^FROM swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/node:20-alpine AS build#FROM node:20-alpine AS build#' frontend/Dockerfile
          sed -i 's#^FROM swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/nginx:alpine#FROM nginx:alpine#' frontend/Dockerfile
          sed -i 's#registry.npmmirror.com#registry.npmjs.org#' frontend/Dockerfile

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:latest
            ${{ env.IMAGE_BASE }}-backend:${{ steps.ver.outputs.version }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ steps.ver.outputs.version }}
